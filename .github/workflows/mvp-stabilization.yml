name: MVP Stabilization CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

permissions:
  contents: read

jobs:
  backend:
    name: Backend check and tests
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: site
          POSTGRES_USER: site
          POSTGRES_PASSWORD: site
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U site -d site"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

    defaults:
      run:
        working-directory: backend

    env:
      # Local development validates through Docker Compose where PostgreSQL is
      # reached as db:5432. GitHub-hosted runners reach service containers
      # through localhost on the mapped port.
      DATABASE_URL: postgres://site:site@localhost:5432/site
      SECRET_KEY: ci-local-secret-key
      DEBUG: "True"
      ALLOWED_HOSTS: localhost,127.0.0.1

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: backend/requirements.txt

      - name: Install backend dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run Django system checks
        run: python manage.py check

      - name: Run Django tests
        run: python manage.py test

  frontend:
    name: Frontend lint, tests and build
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: frontend

    env:
      # Local development runs these gates through Docker Compose and its
      # node_modules volume. CI installs from package-lock.json with npm ci on
      # a GitHub-hosted runner to avoid hidden local state.
      NEXT_PUBLIC_API_URL: http://localhost:8000/api/
      NEXT_TELEMETRY_DISABLED: "1"

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20.20.2"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        run: npm ci

      - name: Run frontend lint
        run: npm run lint

      - name: Run frontend tests
        run: npm test -- --runInBand

      - name: Build frontend
        run: npm run build
