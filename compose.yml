services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: site
      POSTGRES_USER: site
      POSTGRES_PASSWORD: site
    volumes:
      - db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U site -d site"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build:
      context: ./backend
    command: python manage.py runserver 0.0.0.0:8000
    environment:
      DATABASE_URL: postgres://site:site@db:5432/site
      SECRET_KEY: local-compose-secret
      DEBUG: "True"
      ALLOWED_HOSTS: localhost,127.0.0.1,backend
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app
    depends_on:
      db:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
    command: npm run dev -- --hostname 0.0.0.0
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:8000/api/
    ports:
      - "3000:3000"
    volumes:
      - ./frontend:/app
      - frontend_node_modules:/app/node_modules
    depends_on:
      - backend

volumes:
  db_data:
  frontend_node_modules:
